<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeElite - Sign in with Google</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0f1c, #1a2338);
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 40px 30px;
            width: 420px;
            text-align: center;
            box-shadow: 0 25px 60px -10px rgb(0 0 0 / 0.6);
        }
        .logo {
            width: 64px;
            height: 64px;
            background: #22c55e;
            color: #0f172a;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin: 0 0 8px 0;
            color: white;
        }
        p {
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 15px;
        }
        .gmail-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: white;
            color: #1f2937;
            border: none;
            border-radius: 12px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        .gmail-btn:hover {
            background: #f1f5f9;
            transform: translateY(-2px);
        }
        .gmail-btn img {
            width: 22px;
        }
        .divider {
            margin: 24px 0;
            color: #64748b;
            font-size: 14px;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #334155;
        }
        .or {
            background: rgba(15, 23, 42, 0.98);
            padding: 0 16px;
            position: relative;
            z-index: 1;
        }
        .fake-input {
            width: 100%;
            padding: 14px;
            background: #1e2937;
            border: 1px solid #475569;
            border-radius: 10px;
            color: #e2e8f0;
            margin-bottom: 12px;
            font-size: 15px;
            text-align: left;
        }
        button.continue {
            background: #22c55e;
            color: #0f172a;
            font-weight: 700;
            padding: 14px;
            width: 100%;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TE</div>
        <h1>Sign in to TradeElite</h1>
        <p>Use your Gmail account to claim your $ELITE airdrop</p>

        <button class="gmail-btn" onclick="signInWithGmail()">
            
            Continue with Google
        </button>

        <div class="divider"><span class="or">OR</span></div>

        <input type="email" class="fake-input" placeholder="your.email@gmail.com" value="user@gmail.com" readonly>
        
        <button class="continue" onclick="signInWithGmail()">Continue</button>
        
        <p style="font-size:13px; color:#64748b; margin-top: 28px;">
            By continuing, you agree to our Terms and Privacy Policy
        </p>
    </div>

    <script>
        function signInWithGmail() {
            const btn = document.querySelector('.gmail-btn');
            const continueBtn = document.querySelector('.continue');
            
            btn.textContent = "Signing in...";
            btn.disabled = true;
            continueBtn.textContent = "Signing in...";
            continueBtn.disabled = true;

            // Fake loading time for realism
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1450);
        }
    </script>
</body>
</html>
