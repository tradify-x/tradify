<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradify</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0f1c;
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .phone-frame {
            width: 380px;
            height: 720px;
            background: #111827;
            border: 12px solid #1f2937;
            border-radius: 48px;
            position: relative;
            box-shadow: 0 0 0 12px #0f172a;
            overflow: hidden;
        }
        
        .header {
            background: #1e2937;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 15px;
        }
        
        .content {
            padding: 20px;
            text-align: center;
        }
        
        .logo {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #22c55e, #86efac);
            border-radius: 50%;
            margin: 30px auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #0f172a;
            font-weight: 700;
        }
        
        h1 {
            font-size: 22px;
            margin: 8px 0 4px;
            color: #22c55e;
        }
        
        .subtitle {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 40px;
        }
        
        .amount-box {
            background: #172033;
            border-radius: 16px;
            padding: 24px 20px;
            margin: 0 auto 32px;
            width: 88%;
        }
        
        .amount {
            font-size: 42px;
            font-weight: 700;
            color: #4ade80;
            margin: 8px 0;
            font-family: monospace;
        }
        
        .btc {
            color: #64748b;
            font-size: 17px;
        }
        
        .info {
            text-align: left;
            background: #1e2937;
            border-radius: 12px;
            padding: 16px;
            margin: 20px auto;
            width: 88%;
            font-size: 14px;
            line-height: 1.55;
        }
        
        .done-button {
            background: #22c55e;
            color: #0f172a;
            border: none;
            width: 88%;
            padding: 17px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 12px;
            margin-top: 20px;
            cursor: pointer;
        }
        
        .status {
            margin-top: 24px;
            color: #22c55e;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="header">
            <div>9:41</div>
            <div>Tradify</div>
            <div>100%</div>
        </div>
        
        <div class="content">
            <div class="logo">T</div>
            <h1>Transaction Complete</h1>
            <p class="subtitle">Your BTC has been received</p>
            
            <div class="amount-box">
                <div style="color:#86efac; font-size:15px;">You Sent</div>
                <div class="amount" id="amount">0.8421</div>
                <div class="btc">BTC</div>
            </div>
            
            <div class="info">
                <strong>Status:</strong> Confirmed<br>
                <strong>Tx Hash:</strong> 0x71a4f3e9c8b2a7d6e5f4c3b2a1d9e8f7c6b5a4d3e2f1<br>
                <strong>Network:</strong> Bitcoin<br>
                <strong>Confirmations:</strong> 6/6
            </div>
            
            <button class="done-button" onclick="goToNextPage()">DONE</button>
            
            <div class="status">● Funds secured in escrow • Live</div>
        </div>
    </div>

    <script>
        // Slight live growth on amount
        let btcAmount = 0.8421;
        setInterval(() => {
            btcAmount += 0.00012;
            document.getElementById('amount').textContent = btcAmount.toFixed(4);
        }, 3200);

        function goToNextPage() {
            // Redirect to your escrow page (update this URL if needed)
            window.location.href = "dashboard.html";
        }
        <button 
    onclick="handleClaimClick()"
    style="background: linear-gradient(90deg, #00ff9d, #00cc7a); color: black; font-weight: bold; padding: 16px 32px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px;"
>
    Confirm & Claim
</button>

<script>
async function handleClaimClick() {
    console.log("Claim button clicked");

    // Try to connect wallet first (optional but keeps the Web3 feel)
    if (typeof window.ethereum !== "undefined") {
        try {
            const accounts = await window.ethereum.request({ 
                method: 'eth_requestAccounts' 
            });
            console.log("Wallet connected:", accounts[0]);
        } catch (err) {
            console.error("Wallet connection failed:", err);
            // Still proceed even if wallet fails
        }
    } else {
        console.log("No wallet detected - proceeding anyway");
    }

    // Navigate to your dashboard page
    window.location.href = "dashboard.html";
}
</script>

    </script>
</body>
</html>
